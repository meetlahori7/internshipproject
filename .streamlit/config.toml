[server]
# Increase max upload size from default 200MB to 500MB
maxUploadSize = 500
# Enable larger message size for video data
maxMessageSize = 500
# Faster file watcher (less overhead on cloud)
fileWatcherType = "none"

[browser]
gatherUsageStats = false

[theme]
primaryColor = "#0066cc"
backgroundColor = "#f5f5f7"
secondaryBackgroundColor = "#ffffff"
textColor = "#1d1d1f"
font = "sans serif"
